  TAGLINE_AR: تربية الأخلاق وصقل النفس — مدرسة الشيخ الغزالي
  TAGLINE_EN: Character, ethics, and the polished soul — al-Ghazali's school
  TAGLINE_FR: Caractère, éthique, et l'âme polie — l'école d'al-Ghazali
  ABOUT_AR: تطبيق تفاعلي ثلاثي اللغة (عربي/إنجليزي/فرنسي) مستوحى من كتاب "خلق المسلم" للشيخ محمد الغزالي رحمه الله. الكتاب
    يعرض الأخلاق الإسلامية الكبرى — الصدق، الأمانة، الحياء، الرحمة، العدل — مرتبة على أبواب، مع شواهد من الكتاب والسنة.
  ABOUT_EN: Interactive trilingual app (Arabic / English / French) based on <strong>"The Muslim's Character"</strong> by Sheikh
    Mohammed al-Ghazali. The book maps the major Islamic virtues — truthfulness, trustworthiness, modesty, mercy, justice
    — chapter by chapter, with proofs from the Quran and the authentic Sunnah.
  ABOUT_FR: Application interactive trilingue (arabe / anglais / français) inspirée du livre <strong>« Le Caractère du Musulman
    »</strong> du Cheikh Mohammed al-Ghazali. L'ouvrage déploie les grandes vertus islamiques — véracité, probité, pudeur,
    miséricorde, justice — chapitre après chapitre, avec preuves tirées du Coran et de la Sunna authentique.
  SHORT_DESC_AR: الأخلاق الإسلامية مرتبة وموثقة — من كتاب الشيخ الغزالي
  SHORT_DESC_EN: Islamic virtues, organized and sourced — by Sheikh al-Ghazali
  SHORT_DESC_FR: Les vertus islamiques, organisées et sourcées — Cheikh al-Ghazali
  FULL_DESC_AR: '🌟 خلق المسلم — تطبيق تفاعلي


    تطبيق تفاعلي ثلاثي اللغة (عربي/إنجليزي/فرنسي) مستوحى من كتاب "خلق المسلم" للشيخ محمد الغزالي رحمه الله (1917–1996).


    📚 عن الكتاب


    كتاب "خلق المسلم" يعرض جوهر الأخلاق الإسلامية في أبواب منظمة: الصدق، الأمانة، الحياء، الرحمة، العدل، الصبر، الحلم، الإيثار،
    التواضع، وغيرها. لكل خلق فصل قائم بذاته، مع شواهد من القرآن الكريم والسنة النبوية الصحيحة.


    ✨ المزايا


    • كل خلق في بطاقة منفصلة منظمة على فصول الكتاب

    • شواهد من القرآن والسنة لكل خلق

    • ثلاث لغات: عربية، إنجليزية، فرنسية

    • ثلاث سمات لونية

    • وضع القراءة، قارئ صوتي، واجهة عربية بدعم كامل (RTL)

    • يعمل بدون اتصال بالإنترنت


    🕌 إخلاء مسؤولية


    لست عالما في الشريعة. هذا جهد متواضع من أب مسلم لنشر حكمة الشيخ الغزالي بأسلوب تفاعلي. المحتوى مستمد من الكتاب ومصادر
    إسلامية موثوقة. هذا ليس فتوى.


    📖 المصادر


    • كتاب "خلق المسلم" — الشيخ محمد الغزالي

    • القرآن الكريم والسنة النبوية الصحيحة


    رحم الله الشيخ محمد الغزالي وجزاه عنا خير الجزاء 🤲


    —

    Powered by workshop-diy.org

    '
  FULL_DESC_EN: '🌟 Khuluq al-Muslim — The Muslim''s Character


    Interactive trilingual app (Arabic / English / French) based on the book "The Muslim''s Character" (Khuluq al-Muslim)
    by Sheikh Mohammed al-Ghazali (1917–1996).


    📚 About the book


    "The Muslim''s Character" maps the core Islamic virtues across organized chapters: truthfulness, trustworthiness, modesty,
    mercy, justice, patience, forbearance, generosity of spirit, humility, and more. Each virtue gets its own chapter, with
    proofs from the Holy Quran and the authentic Sunnah.


    ✨ Features


    • Each virtue presented as a structured card following the book''s chapters

    • Quranic verses and authentic hadith proofs for every virtue

    • Three languages: Arabic, English, French

    • Three color themes

    • Reading mode, audio narrator, full RTL Arabic support

    • Works offline — no internet required


    🕌 Disclaimer


    I am not a scholar. This is a humble effort by a Muslim parent to share Sheikh al-Ghazali''s wisdom interactively. Content
    is derived from the book and trusted Islamic sources. This is not a fatwa.


    📖 Sources


    • "The Muslim''s Character" (Khuluq al-Muslim) — Sheikh Mohammed al-Ghazali

    • The Holy Quran and authentic Sunnah


    May Allah have mercy on Sheikh al-Ghazali and reward him 🤲


    —

    Powered by workshop-diy.org

    '
  FULL_DESC_FR: '🌟 Khuluq al-Muslim — Le Caractère du Musulman


    Application interactive trilingue (arabe / anglais / français) inspirée du livre « Le Caractère du Musulman » (Khuluq
    al-Muslim) du Cheikh Mohammed al-Ghazali (1917–1996).


    📚 À propos du livre


    « Le Caractère du Musulman » dresse la carte des grandes vertus islamiques au fil de chapitres organisés : véracité, probité,
    pudeur, miséricorde, justice, patience, indulgence, générosité d''âme, humilité, et bien d''autres. Chaque vertu a son
    chapitre propre, étayé par des preuves tirées du Saint Coran et de la Sunna authentique.


    ✨ Fonctionnalités


    • Chaque vertu présentée en fiche structurée selon les chapitres du livre

    • Versets coraniques et hadiths authentiques pour chaque vertu

    • Trois langues : arabe, anglais, français

    • Trois thèmes visuels

    • Mode lecture, narrateur audio, prise en charge complète de l''arabe (RTL)

    • Fonctionne hors ligne — aucune connexion requise


    🕌 Avertissement


    Je ne suis pas un savant. Il s''agit d''un modeste effort d''un parent musulman pour partager la sagesse du Cheikh al-Ghazali
    de manière interactive. Le contenu est tiré du livre et de sources islamiques fiables. Ceci n''est pas une fatwa.


    📖 Sources


    • « Le Caractère du Musulman » (Khuluq al-Muslim) — Cheikh Mohammed al-Ghazali

    • Le Saint Coran et la Sunna authentique


    Qu''Allah fasse miséricorde au Cheikh al-Ghazali et le récompense 🤲


    —

    Propulsé par workshop-diy.org

